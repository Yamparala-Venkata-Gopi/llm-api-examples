name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'python-app/**'
      - 'java-app/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/llm-api-python
  JAVA_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/llm-api-java

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      java: ${{ steps.filter.outputs.java }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect which app directories changed
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - 'python-app/**'
            java:
              - 'java-app/**'

  build-and-push-python:
    name: Python App
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Python image
        uses: docker/build-push-action@v5
        with:
          context: ./python-app
          push: true
          tags: |
            ${{ env.PYTHON_IMAGE }}:latest
            ${{ env.PYTHON_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-java:
    name: Java App
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.java == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Java image
        uses: docker/build-push-action@v5
        with:
          context: ./java-app
          push: true
          tags: |
            ${{ env.JAVA_IMAGE }}:latest
            ${{ env.JAVA_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
