apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-api-app.fullname" . }}-api-keys
  labels:
    {{- include "llm-api-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.apiKeys.openai | quote }}
  ANTHROPIC_API_KEY: {{ .Values.apiKeys.anthropic | quote }}
  COHERE_API_KEY: {{ .Values.apiKeys.cohere | quote }}
  MISTRAL_API_KEY: {{ .Values.apiKeys.mistral | quote }}
  GOOGLE_API_KEY: {{ .Values.apiKeys.google | quote }}
  GROQ_API_KEY: {{ .Values.apiKeys.groq | quote }}
